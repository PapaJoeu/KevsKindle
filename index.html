<!--
  Kev's Kindle — index.html
  Minimal shell for the data-driven start page.
  Loads styles.css and app.js, which fetch JSON data to render content.
  Header text serves as a fallback while data loads.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kev's Kindle</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a1a1a'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='white' font-family='Georgia,serif' font-size='22'>K</text></svg>">
</head>
<body>
  <div class="header">
    <h1>Kev's Kindle</h1>
    <div class="subtitle">Because the browser is there. Might as well use it.</div>
    <div class="device-badge">loading…</div>
  </div>
  <div id="content">
    <div class="loading">Loading links…</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
